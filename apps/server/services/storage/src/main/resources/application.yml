server:
  port: 8082

spring:
  datasource:
    driver-class-name: org.postgresql.Driver
    url: jdbc:postgresql://localhost:5432/minecloud
    username: postgres
    password: postgres
  servlet:
    multipart:
      enabled: true
      max-file-size: 50MB
      max-request-size: 50MB
  data:
    redis:
      host: ${SPRING_REDIS_HOST:localhost}
      port: ${SPRING_REDIS_PORT:6379}
      password: ${SPRING_REDIS_PASSWORD:redis}
      timeout: 3000ms
      lettuce:
        pool:
          max-active: 8
          max-idle: 8
          min-idle: 2
          max-wait: 1000ms

  logging:
    level:
      org.feiesos.storage.backend: DEBUG

mybatis-plus:
  configuration:
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl # 开发环境打印 SQL
  global-config:
    db-config:
      id-type: assign_id # 使用雪花算法生成 ID，适合分布式
      logic-delete-field: isDeleted  # 逻辑删除字段名
      logic-delete-value: "true"     # 删除状态的值（加引号，作为布尔值处理）
      logic-not-delete-value: "false" # 未删除状态的值

minecloud:
  storage:
    default-type: LOCAL
    upload-path: ./data/storage
    chunk:
      temp-dir: temp
    recycle:
      retention-days: 30             # 回收站文件保留天数，超过自动清理
      cleanup-cron: "0 0 3 * * ?"    # 每天凌晨3点执行清理